<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agasthyaarkoodam Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-bottom: 40px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-top: 10px; }
        .stats-box { background: #ffffff; border: 1px solid #dee2e6; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .nav-pills .nav-link { color: #555; font-weight: 600; transition: 0.3s; }
        .nav-pills .nav-link.active { background-color: #198754; box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3); }
        .absentee-row { background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #ffc107; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .summary-row { background-color: #212529 !important; color: white; font-weight: bold; }
        label { font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .table-responsive { max-height: 550px; overflow-y: auto; font-size: 0.85rem; border-radius: 8px; }
        .is-invalid { border: 2px solid #dc3545 !important; }
        #dupWarn { display: none; }
    </style>
</head>
<body>

<div class="container py-4">
    <h3 class="text-center text-success fw-bold mb-4">Agasthyaarkoodam Trek Portal</h3>
    
    <ul class="nav nav-pills nav-fill mb-4" id="tabMenu">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#entryTab">DATA ENTRY</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#summaryTab" onclick="loadData()">SUMMARY REPORT</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#absTab" onclick="loadData()">ABSENTEE LIST</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="entryTab">
            <div class="card p-4">
                <div id="dupWarn" class="alert alert-warning py-2 small fw-bold text-center border-warning">⚠️ DATE ALREADY ENTERED: Submission will overwrite existing record.</div>
                
                <div class="stats-box row text-center g-0 shadow-sm">
                    <div class="col-4"><small class="d-block text-muted">TOTAL REG</small><span id="stReg" class="h5 fw-bold mb-0">0</span></div>
                    <div class="col-4 border-start border-end"><small class="d-block text-muted">ATTENDED</small><span id="stAtt" class="h5 fw-bold text-success mb-0">0</span></div>
                    <div class="col-4"><small class="d-block text-muted">ABSENTEES</small><span id="stAbs" class="h5 fw-bold text-danger mb-0">0</span></div>
                </div>

                <form id="trekForm">
                    <div class="mb-3"><label>Trek Date</label><input type="date" id="tDate" class="form-control form-control-lg" required onchange="checkDup()"></div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-6"><label>Online Reg</label><input type="number" id="onR" class="form-control calc" value="0" min="0"></div>
                        <div class="col-6"><label>Offline Reg</label><input type="number" id="offR" class="form-control calc" value="0" min="0"></div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6"><label>Online Attd</label><input type="number" id="onA" class="form-control calc" value="0" min="0"></div>
                        <div class="col-6"><label>Offline Attd</label><input type="number" id="offA" class="form-control calc" value="0" min="0"></div>
                    </div>
                    
                    <div class="p-3 bg-light rounded-3 mb-3 border">
                        <label class="mb-2 d-block text-center text-primary">Gender Breakdown (Must match Attended)</label>
                        <div class="row g-2">
                            <div class="col-4"><label>Men</label><input type="number" id="men" class="form-control g-calc" value="0" min="0"></div>
                            <div class="col-4"><label>Women</label><input type="number" id="women" class="form-control g-calc" value="0" min="0"></div>
                            <div class="col-4"><label>Other</label><input type="number" id="other" class="form-control g-calc" value="0" min="0"></div>
                        </div>
                        <p id="gErr" class="text-danger text-center small fw-bold mt-2 mb-0" style="display:none;">⚠️ Men + Women + Other must equal Total Attended!</p>
                    </div>

                    <div id="absArea"></div>
                    <button type="submit" id="subBtn" class="btn btn-success btn-lg w-100 mt-3 fw-bold">SAVE DAILY RECORD</button>
                </form>
            </div>
        </div>

        <div class="tab-pane fade" id="summaryTab">
            <div class="card p-3">
                <div class="row g-2 mb-3">
                    <div class="col-5"><label>From</label><input type="date" id="sS" class="form-control form-control-sm"></div>
                    <div class="col-5"><label>To</label><input type="date" id="sE" class="form-control form-control-sm"></div>
                    <div class="col-2 d-flex align-items-end"><button class="btn btn-dark btn-sm w-100" onclick="renderSummary()">FILTER</button></div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-bordered align-middle">
                        <thead class="table-dark"><tr><th>Date</th><th>Reg</th><th>Attd</th><th>M / W / O</th></tr></thead>
                        <tbody id="sBody"></tbody>
                        <tfoot id="sFoot"></tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="absTab">
            <div class="card p-3">
                <div class="row g-2 mb-3">
                    <div class="col-5"><label>From</label><input type="date" id="aS" class="form-control form-control-sm"></div>
                    <div class="col-5"><label>To</label><input type="date" id="aE" class="form-control form-control-sm"></div>
                    <div class="col-2 d-flex align-items-end"><button class="btn btn-dark btn-sm w-100" onclick="renderAbs()">FILTER</button></div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-bordered align-middle">
                        <thead class="table-dark"><tr><th>Date</th><th>Name</th><th>Ticket</th><th>Type</th></tr></thead>
                        <tbody id="aBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const URL = "https://script.google.com/macros/s/AKfycbxwGcNDY8dtAXh9_IEQOtNu5ZRdeAuWgNnacE5quJ_QpbyKHyl7UbyemuEo_lJXJELryA/exec"; 
    let summaryData = [], absenteeData = [];

    // Initialize and Refresh Data
    async function loadData() {
        try {
            const r = await fetch(URL);
            const d = await r.json();
            summaryData = d.summary;
            absenteeData = d.absentees;
            renderSummary();
            renderAbs();
        } catch(e) { console.error("Data Load Error:", e); }
    }

    // Duplicate Check logic
    function checkDup() {
        const sel = document.getElementById('tDate').value;
        if (!sel) return;
        const exists = summaryData.some(r => r.Date.split('T')[0] === sel);
        document.getElementById('dupWarn').style.display = exists ? 'block' : 'none';
    }

    // Calculations & Dynamic Absentee Rows
    document.querySelectorAll('.calc, .g-calc').forEach(el => {
        el.addEventListener('input', () => {
            const tr = (+document.getElementById('onR').value) + (+document.getElementById('offR').value);
            const ta = (+document.getElementById('onA').value) + (+document.getElementById('offA').value);
            const abs = tr - ta;
            document.getElementById('stReg').innerText = tr;
            document.getElementById('stAtt').innerText = ta;
            document.getElementById('stAbs').innerText = abs > 0 ? abs : 0;

            const m = +document.getElementById('men').value, w = +document.getElementById('women').value, o = +document.getElementById('other').value;
            const err = (m+w+o !== ta && ta > 0);
            document.getElementById('gErr').style.display = err ? 'block' : 'none';
            document.querySelectorAll('.g-calc').forEach(input => err ? input.classList.add('is-invalid') : input.classList.remove('is-invalid'));
            
            if (el.classList.contains('calc')) {
                const area = document.getElementById('absArea');
                area.innerHTML = abs > 0 ? '<label class="text-danger mt-3 mb-2">Detailed Absentee List</label>' : '';
                for(let i=0; i<abs; i++) {
                    area.innerHTML += `<div class="absentee-row row g-1">
                        <div class="col-5"><input type="text" class="form-control form-control-sm a-n" placeholder="Name" required></div>
                        <div class="col-4"><input type="text" class="form-control form-control-sm a-t" placeholder="Ticket" required></div>
                        <div class="col-3"><select class="form-select form-select-sm a-y"><option value="Online">On</option><option value="Offline">Off</option></select></div>
                    </div>`;
                }
            }
        });
    });

    // Form Submission
    document.getElementById('trekForm').onsubmit = async (e) => {
        e.preventDefault();
        const ta = +document.getElementById('stAtt').innerText;
        const gt = (+document.getElementById('men').value) + (+document.getElementById('women').value) + (+document.getElementById('other').value);
        
        if (gt !== ta) {
            alert("HARD VALIDATION ERROR: The total of Men, Women, and Others (" + gt + ") does not match the Total Attended (" + ta + ").");
            return;
        }

        const btn = document.getElementById('subBtn'); btn.disabled = true; btn.innerText = "Transmitting Data...";
        
        const payload = {
            date: document.getElementById('tDate').value,
            onlineReg: document.getElementById('onR').value, offlineReg: document.getElementById('offR').value,
            totalReg: document.getElementById('stReg').innerText,
            onlineTurnout: document.getElementById('onA').value, offlineTurnout: document.getElementById('offA').value,
            totalTurnout: ta, men: document.getElementById('men').value, women: document.getElementById('women').value, other: document.getElementById('other').value,
            absenteeList: Array.from(document.querySelectorAll('.absentee-row')).map(r => ({
                name: r.querySelector('.a-n').value, ticket: r.querySelector('.a-t').value, type: r.querySelector('.a-y').value
            }))
        };

        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Data successfully saved and sheet updated!");
            location.reload(); 
        } catch(e) { alert("Connectivity Error. Please try again."); btn.disabled = false; btn.innerText = "SAVE DAILY RECORD"; }
    };

    function renderSummary() {
        const start = document.getElementById('sS').value ? new Date(document.getElementById('sS').value).setHours(0,0,0,0) : 0;
        const end = document.getElementById('sE').value ? new Date(document.getElementById('sE').value).setHours(23,59,59,999) : 9e12;
        let tr=0, ta=0, tm=0, tw=0, to=0;
        const filtered = summaryData.filter(r => { const d = new Date(r.Date).getTime(); return d >= start && d <= end; });
        
        document.getElementById('sBody').innerHTML = filtered.map(r => {
            const reg=+r.totalReg||0, att=+r.totalTurnout||0, m=+r.Men||0, w=+r.Women||0, o=+r.Other||0;
            tr+=reg; ta+=att; tm+=m; tw+=w; to+=o;
            return `<tr><td>${new Date(r.Date).toLocaleDateString('en-GB')}</td><td>${reg}</td><td>${att}</td><td>${m}/${w}/${o}</td></tr>`;
        }).join('');
        document.getElementById('sFoot').innerHTML = `<tr class="summary-row"><td>TOTAL</td><td>${tr}</td><td>${ta}</td><td>${tm}/${tw}/${to}</td></tr>`;
    }

    function renderAbs() {
        const start = document.getElementById('aS').value ? new Date(document.getElementById('aS').value).setHours(0,0,0,0) : 0;
        const end = document.getElementById('aE').value ? new Date(document.getElementById('aE').value).setHours(23,59,59,999) : 9e12;
        const filtered = absenteeData.filter(r => { const d = new Date(r.Date).getTime(); return d >= start && d <= end; });
        
        document.getElementById('aBody').innerHTML = filtered.map(r => `
            <tr><td>${new Date(r.Date).toLocaleDateString('en-GB')}</td><td>${r.Name}</td><td>${r['Ticket No']}</td><td>${r.Type}</td></tr>
        `).join('');
    }

    window.onload = () => loadData();
</script>
</body>
</html>
